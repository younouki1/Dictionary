<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dictionary</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#1f6feb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dictionary">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="appbar">
    <button class="tab" data-view="words" aria-current="true">Words</button>
    <button class="tab" data-view="sources">Sources</button>
  </header>

  <!-- Word list -->
  <main id="view-words" class="view">
    <div class="toolbar">
      <select id="filter-source" aria-label="Filter by source"></select>
      <input id="search" type="search" placeholder="Search by word or translation" autocomplete="off">
    </div>
    <div id="word-groups" class="groups"></div>
    <p id="empty-list" class="empty hidden">No words yet. Tap + to add one.</p>
  </main>

  <!-- Sources -->
  <main id="view-sources" class="view hidden">
    <div class="toolbar">
      <input id="new-source-name" type="text" placeholder="New source name (book, article…)" autocomplete="off" enterkeyhint="done">
      <select id="new-source-type" aria-label="Source type">
        <option value="book">Book</option>
        <option value="article">Article</option>
        <option value="video">Video</option>
        <option value="other">Other</option>
      </select>
      <button id="add-source-btn" type="button" class="add-src-btn">Add</button>
    </div>
    <div id="source-list" class="source-list"></div>
  </main>

  <!-- Floating buttons -->
  <button id="fab-settings" class="fab fab-secondary" aria-label="Settings">⚙</button>
  <button id="fab-add" class="fab" aria-label="Add word">+</button>

  <!-- Sheet: add words -->
  <div id="add-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="sheet">
      <h2>Add words</h2>
      <p class="hint">Translating to <strong id="add-native"></strong>. Type a word and press Enter.</p>
      <label>Word language
        <select id="q-src"></select>
      </label>
      <label>Source
        <select id="q-source"></select>
      </label>
      <input id="q-word" type="text" placeholder="Type a word, press Enter"
             autocomplete="off" autocapitalize="none" enterkeyhint="done">
      <p id="add-status" class="hint"></p>
      <div class="actions">
        <button id="add-close" type="button" class="primary">Done</button>
      </div>
    </div>
  </div>

  <!-- Sheet: settings -->
  <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="sheet">
      <h2>Settings</h2>
      <label>Native language (translate to)
        <select id="s-native"></select>
      </label>
      <label>Default word language (translate from)
        <select id="s-source-lang"></select>
      </label>

      <h3 class="section-head">Backup</h3>
      <p class="hint">Save all words and sources to a file, or restore from one. Importing merges (nothing is deleted).</p>
      <button id="export-btn" type="button" class="wide-ghost">⬇ Export words (JSON)</button>
      <button id="import-btn" type="button" class="wide-ghost">⬆ Import words (JSON)</button>
      <input id="import-file" type="file" accept="application/json,.json" hidden>
      <p id="backup-status" class="hint"></p>

      <div class="actions">
        <button id="settings-close" type="button" class="primary">Done</button>
      </div>
    </div>
  </div>

  <!-- Modal: edit a word (manual corrections / re-fetch) -->
  <div id="word-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="sheet">
      <h2 id="word-modal-title">Edit word</h2>

      <label>Word
        <input id="f-text" type="text" autocomplete="off" autocapitalize="none">
      </label>

      <div class="row">
        <label>From
          <select id="f-src"></select>
        </label>
        <label>To
          <select id="f-tgt"></select>
        </label>
      </div>

      <label>Translation
        <input id="f-translation" type="text" autocomplete="off">
      </label>

      <label>Transcription (IPA)
        <input id="f-transcription" type="text" autocomplete="off">
      </label>

      <label>Definition
        <textarea id="f-definition" rows="2"></textarea>
      </label>

      <label>Example
        <textarea id="f-example" rows="2"></textarea>
      </label>

      <button id="f-refetch" type="button" class="wide-ghost">↻ Re-fetch from web</button>
      <span id="f-refetch-status" class="hint"></span>

      <label>Source
        <select id="f-source"></select>
      </label>

      <label>Note (optional)
        <textarea id="f-note" rows="2"></textarea>
      </label>

      <div class="actions">
        <button id="f-cancel" type="button" class="ghost">Cancel</button>
        <button id="f-save" type="button" class="primary">Save</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/translate.js"></script>
  <script src="js/dictionary.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
